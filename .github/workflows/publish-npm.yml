name: Publish npm Packages

# Manual-only to avoid publishing intermediate versions.
# Run this after verifying the GitHub release looks correct.
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Build Binaries workflow run ID (from release or manual build)"
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: release

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Download all binary artifacts from the specified build run
      - name: Download linux-x64 binary
        uses: actions/download-artifact@v8
        with:
          name: iblai-linux-x64
          path: .iblai/npm/cli-linux-x64/bin/
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download linux-arm64 binary
        uses: actions/download-artifact@v8
        with:
          name: iblai-linux-arm64
          path: .iblai/npm/cli-linux-arm64/bin/
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download darwin-arm64 binary
        uses: actions/download-artifact@v8
        with:
          name: iblai-darwin-arm64
          path: .iblai/npm/cli-darwin-arm64/bin/
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download win32-x64 binary
        uses: actions/download-artifact@v8
        with:
          name: iblai-win32-x64
          path: .iblai/npm/cli-win32-x64/bin/
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download win32-arm64 binary
        uses: actions/download-artifact@v8
        with:
          name: iblai-win32-arm64
          path: .iblai/npm/cli-win32-arm64/bin/
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Mark binaries as executable
      - name: Set binary permissions
        run: |
          chmod +x .iblai/npm/cli-linux-x64/bin/iblai
          chmod +x .iblai/npm/cli-linux-arm64/bin/iblai
          chmod +x .iblai/npm/cli-darwin-arm64/bin/iblai

      # Verify artifacts were downloaded
      - name: Verify binaries
        run: |
          echo "=== linux-x64 ==="
          ls -la .iblai/npm/cli-linux-x64/bin/
          echo "=== linux-arm64 ==="
          ls -la .iblai/npm/cli-linux-arm64/bin/
          echo "=== darwin-arm64 ==="
          ls -la .iblai/npm/cli-darwin-arm64/bin/
          echo "=== win32-x64 ==="
          ls -la .iblai/npm/cli-win32-x64/bin/
          echo "=== win32-arm64 ==="
          ls -la .iblai/npm/cli-win32-arm64/bin/

      # Publish platform packages first, then the main package
      - name: Publish @iblai/cli-linux-x64
        run: npm publish --access public
        working-directory: .iblai/npm/cli-linux-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @iblai/cli-linux-arm64
        run: npm publish --access public
        working-directory: .iblai/npm/cli-linux-arm64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @iblai/cli-darwin-arm64
        run: npm publish --access public
        working-directory: .iblai/npm/cli-darwin-arm64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @iblai/cli-win32-x64
        run: npm publish --access public
        working-directory: .iblai/npm/cli-win32-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @iblai/cli-win32-arm64
        run: npm publish --access public
        working-directory: .iblai/npm/cli-win32-arm64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish main wrapper package last (depends on platform packages)
      - name: Publish @iblai/cli
        run: npm publish --access public
        working-directory: .iblai/npm/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
