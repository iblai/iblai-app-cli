name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build-binaries.yml

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/iblai-linux-x64/iblai     release/iblai-linux-x64
          cp artifacts/iblai-linux-arm64/iblai    release/iblai-linux-arm64
          cp artifacts/iblai-darwin-arm64/iblai   release/iblai-darwin-arm64
          cp artifacts/iblai-win32-x64/iblai.exe  release/iblai-win32-x64.exe
          cp artifacts/iblai-win32-arm64/iblai.exe release/iblai-win32-arm64.exe
          chmod +x release/iblai-linux-x64 release/iblai-linux-arm64 release/iblai-darwin-arm64

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            release/iblai-linux-x64
            release/iblai-linux-arm64
            release/iblai-darwin-arm64
            release/iblai-win32-x64.exe
            release/iblai-win32-arm64.exe

  pypi:
    needs: build
    uses: ./.github/workflows/publish-pypi.yml
    secrets: inherit
