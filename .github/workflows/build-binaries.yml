name: Build Binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux-x64
            artifact: iblai
          - os: ubuntu-22.04-arm
            target: linux-arm64
            artifact: iblai
          - os: macos-14
            target: darwin-arm64
            artifact: iblai
          - os: windows-latest
            target: win32-x64
            artifact: iblai.exe
          - os: windows-11-arm
            target: win32-arm64
            artifact: iblai.exe

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: IBLAI_VENV=0 bash .iblai/scripts/build-binary.sh

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        run: pwsh .iblai/scripts/build-binary.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iblai-${{ matrix.target }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
